# Fresh trigger to verify fix
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL is missing, using dummy for build verification"
            export DATABASE_URL="***REMOVED***"
            export NEON_AUTH_BASE_URL="https://dummy.neonauth.tech"
            export NEON_AUTH_COOKIE_SECRET="[REDACTED]"
          fi
          pnpm prisma generate
          pnpm next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_AUTH_BASE_URL: ${{ secrets.NEON_AUTH_BASE_URL }}
          NEON_AUTH_COOKIE_SECRET: ${{ secrets.NEON_AUTH_COOKIE_SECRET }}
          NEXT_PUBLIC_NEON_AUTH_BASE_URL: ${{ secrets.NEON_AUTH_BASE_URL }}
